<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="30%" x2="50%" y2="70%" x2="50%" y2="70%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rankGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" rx="12" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="2" y="2" width="396" height="496" rx="11" fill="none" stroke="#FF6B35" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Inner border accent -->
  <rect x="8" y="8" width="384" height="484" rx="8" fill="none" stroke="#FF6B35" stroke-opacity="0.1" stroke-width="0.5"/>

  <!-- Radial glow behind rank -->
  <ellipse cx="200" cy="190" rx="140" ry="120" fill="url(#glow)" filter="url(#softGlow)"/>

  <!-- Decorative top line -->
  <line x1="60" y1="50" x2="340" y2="50" stroke="#FF6B35" stroke-opacity="0.4" stroke-width="0.5"/>
  <line x1="80" y1="53" x2="320" y2="53" stroke="#FF6B35" stroke-opacity="0.2" stroke-width="0.5"/>

  <!-- Small diamond ornaments -->
  <polygon points="200,42 206,50 200,58 194,50" fill="#FF6B35" fill-opacity="0.5"/>

  <!-- Rank letter -->
  <text x="200" y="210" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="bold" fill="url(#rankGrad)" filter="url(#textGlow)">S</text>

  <!-- Rank label -->
  <text x="200" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FF6B35" fill-opacity="0.6" letter-spacing="6">RANK</text>

  <!-- Decorative separator -->
  <line x1="100" y1="290" x2="300" y2="290" stroke="#FF6B35" stroke-opacity="0.3" stroke-width="0.5"/>
  <polygon points="200,284 206,290 200,296 194,290" fill="#FF6B35" fill-opacity="0.4"/>

  <!-- Creature name -->
  <text x="200" y="340" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="bold" fill="#e8e8f0" letter-spacing="1">Phénix de Glace</text>

  <!-- Subtle name underline -->
  <line x1="200" y1="352" x2="200" y2="352" stroke="#FF6B35" stroke-opacity="0.5" stroke-width="20" stroke-linecap="round" opacity="0.15"/>

  <!-- Bottom decorative line -->
  <line x1="80" y1="460" x2="320" y2="460" stroke="#FF6B35" stroke-opacity="0.3" stroke-width="0.5"/>
  <line x1="100" y1="463" x2="300" y2="463" stroke="#FF6B35" stroke-opacity="0.15" stroke-width="0.5"/>

  <!-- Bottom diamond -->
  <polygon points="200,452 206,460 200,468 194,460" fill="#FF6B35" fill-opacity="0.4"/>
</svg>