<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#0f1228"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#2CB5AC"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0"/>
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="12" fill="url(#bgGrad)"/>

  <!-- Border -->
  <rect x="1.5" y="1.5" width="597" height="397" rx="11" fill="none" stroke="#4ECDC4" stroke-opacity="0.25" stroke-width="1.5"/>
  <rect x="6" y="6" width="588" height="388" rx="9" fill="none" stroke="#4ECDC4" stroke-opacity="0.08" stroke-width="0.5"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="240" ry="150" fill="url(#centerGlow)"/>

  <!-- Soft glow blob -->
  <ellipse cx="300" cy="180" rx="160" ry="100" fill="#4ECDC4" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Decorative orbs -->
  <circle cx="70" cy="80" r="40" fill="#4ECDC4" opacity="0.04"/>
    <circle cx="330" cy="100" r="55" fill="#4ECDC4" opacity="0.03"/>
    <circle cx="60" cy="320" r="30" fill="#4ECDC4" opacity="0.05"/>
    <circle cx="340" cy="300" r="45" fill="#4ECDC4" opacity="0.03"/>
    <circle cx="200" cy="50" r="20" fill="#4ECDC4" opacity="0.06"/>

  <!-- Floating particles -->
  <circle cx="50" cy="150" r="1.5" fill="#4ECDC4" opacity="0.4"/>
    <circle cx="350" cy="200" r="1.5" fill="#4ECDC4" opacity="0.4"/>
    <circle cx="100" cy="380" r="1.5" fill="#4ECDC4" opacity="0.4"/>
    <circle cx="300" cy="50" r="1.5" fill="#4ECDC4" opacity="0.4"/>
    <circle cx="250" cy="400" r="1.5" fill="#4ECDC4" opacity="0.4"/>
    <circle cx="150" cy="60" r="1.5" fill="#4ECDC4" opacity="0.4"/>

  <!-- Top decorative lines -->
  <line x1="80" y1="45" x2="520" y2="45" stroke="#4ECDC4" stroke-opacity="0.3" stroke-width="0.5"/>
  <line x1="110" y1="48" x2="490" y2="48" stroke="#4ECDC4" stroke-opacity="0.15" stroke-width="0.5"/>

  <!-- Top center diamond -->
  <polygon points="300,36 307,45 300,54 293,45" fill="#4ECDC4" fill-opacity="0.5"/>

  <!-- Small corner accents -->
  <path d="M20,20 L50,20 L20,50 Z" fill="#4ECDC4" opacity="0.06"/>
  <path d="M580,20 L550,20 L580,50 Z" fill="#4ECDC4" opacity="0.06"/>
  <path d="M20,380 L50,380 L20,350 Z" fill="#4ECDC4" opacity="0.06"/>
  <path d="M580,380 L550,380 L580,350 Z" fill="#4ECDC4" opacity="0.06"/>

  <!-- Type label -->
  <text x="300" y="100" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#4ECDC4" fill-opacity="0.6" letter-spacing="8">CACHÉ</text>

  <!-- Realm name - main -->
  <text x="300" y="180" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="bold" fill="url(#accentGrad)" filter="url(#textGlow)">Les Enfers</text>

  <!-- Name shadow underline -->
  <line x1="200" y1="198" x2="400" y2="198" stroke="url(#accentGrad)" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Decorative separator -->
  <line x1="150" y1="225" x2="450" y2="225" stroke="#4ECDC4" stroke-opacity="0.2" stroke-width="0.5"/>
  <polygon points="300,219 306,225 300,231 294,225" fill="#4ECDC4" fill-opacity="0.4"/>

  <!-- Side ornamental lines -->
  <line x1="60" y1="180" x2="140" y2="180" stroke="#4ECDC4" stroke-opacity="0.2" stroke-width="0.5"/>
  <line x1="460" y1="180" x2="540" y2="180" stroke="#4ECDC4" stroke-opacity="0.2" stroke-width="0.5"/>
  <circle cx="60" cy="180" r="2" fill="#4ECDC4" opacity="0.3"/>
  <circle cx="540" cy="180" r="2" fill="#4ECDC4" opacity="0.3"/>

  <!-- Danger level section -->
  <text x="300" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#4ECDC4" fill-opacity="0.5" letter-spacing="4">DANGER</text>

  <!-- Danger stars - filled -->
  <text x="300" y="300" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#4ECDC4" filter="url(#textGlow)">★★★★★</text>

  <!-- Danger stars - empty -->
  <text x="365" y="300" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#4ECDC4" fill-opacity="0.25"></text>

  <!-- Bottom decorative lines -->
  <line x1="80" y1="355" x2="520" y2="355" stroke="#4ECDC4" stroke-opacity="0.3" stroke-width="0.5"/>
  <line x1="110" y1="358" x2="490" y2="358" stroke="#4ECDC4" stroke-opacity="0.15" stroke-width="0.5"/>

  <!-- Bottom center diamond -->
  <polygon points="300,346 307,355 300,364 293,355" fill="#4ECDC4" fill-opacity="0.5"/>

  <!-- Bottom corner flourishes -->
  <path d="M30,375 Q40,365 50,375" fill="none" stroke="#4ECDC4" stroke-opacity="0.2" stroke-width="0.5"/>
  <path d="M570,375 Q560,365 550,375" fill="none" stroke="#4ECDC4" stroke-opacity="0.2" stroke-width="0.5"/>
</svg>